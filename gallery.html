<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>024ИС - Галерея</title>
</head>
<body>
    <header class="header">
        <div class="container nav-container">
            <div class="logo"><img src="logo-024is.png" alt="Логотип"></div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="events.html">События</a>
                <a href="gallery.html">Галерея</a>
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Тема</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title fade-in">Галерея</h2>
        <div class="gallery-grid">
            <div class="gallery-item fade-in" onclick="openLightbox('image_21.jpg')">
                <img src="image_21.jpg" alt="С днём учителя" loading="lazy">
            </div>
            <div class="gallery-item fade-in" onclick="openLightbox('image_22.jpg')">
                <img src="image_22.jpg" alt="Групповое фото" loading="lazy">
            </div>
            <div class="gallery-item fade-in" onclick="openLightbox('image_23.jpg')">
                <img src="image_23.jpg" alt="На природе" loading="lazy">
            </div>
            <div class="gallery-item fade-in" onclick="openLightbox('image_24.jpg')">
                <img src="image_24.jpg" alt="Субботник" loading="lazy">
            </div>
            <div class="gallery-item fade-in" onclick="openLightbox('image_25.jpg')">
                <img src="image_25.jpg" alt="В классе" loading="lazy">
            </div>
            <div class="gallery-item fade-in" onclick="openLightbox('image_26.jpg')">
                <img src="image_26.jpg" alt="На стадионе" loading="lazy">
            </div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <footer class="footer">
        <div class="container nav-container">
            <div class="logo"><img src="logo-024is.png" alt="Логотип"></div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="events.html">События</a>
                <a href="gallery.html">Галерея</a>
            </nav>
        </div>
        <div class="footer-copyright">
            <p>&copy; 2026 Группа 024ИС. Сделано с душой.</p>
        </div>
    </footer>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            const btn = document.querySelector('.theme-toggle');
            if (btn) btn.textContent = next === 'dark' ? '☀️ Тема' : '🌙 Тема';
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
            const btn = document.querySelector('.theme-toggle');
            if (btn) btn.textContent = saved === 'dark' ? '☀️ Тема' : '🌙 Тема';
        })();

        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
